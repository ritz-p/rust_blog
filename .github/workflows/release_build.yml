name: Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build project
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Rename artifact
        shell: bash
        run: |
          mv target/x86_64-unknown-linux-gnu/release/rust_blog \
             target/x86_64-unknown-linux-gnu/release/rust_blog-${{ github.ref_name }}-x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: rust_blog-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/rust_blog-${{ github.ref_name }}-x86_64-unknown-linux-gnu
